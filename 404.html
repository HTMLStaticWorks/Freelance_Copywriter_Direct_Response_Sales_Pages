<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Alex Carter</title>
    <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" href="img/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="img/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      text-align: center;
      padding: 100px 20px;
    }
    .error-code {
      font-size: 10rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent-color), #4f46e5);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0;
      animation: floating 3s ease-in-out infinite alternate;
    }
    .error-illustration {
      max-width: 400px;
      margin: 0 auto 2rem;
    }
  </style>
</head>
<body>
  <!-- Global Header -->
  <header class="global-header">
    <div class="container">
      <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <img src="img/logo-icon.png" alt="Brand Logo" height="36" class="brand-logo-icon"> 
          <span class="brand-text-name fw-bold">ALEX<span class="text-gradient">COPY.</span></span>
        </a>
        <div class="header-controls ms-auto">
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">☀️</button>
          <button id="rtlToggle" class="rtl-toggle" aria-label="Toggle RTL">⇄</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="error-page">
    <div class="container animate-on-scroll zoom-in">
      <div class="error-code">404</div>
      <h2 class="display-5 fw-bold mb-3 mt-4">Looks like you're lost.</h2>
      <p class="text-secondary lead mb-5 max-w-2xl mx-auto">The page you are looking for has been moved, deleted, or possibly never existed in the first place.</p>
      <a href="index.html" class="btn btn-premium btn-lg">Return to Homepage</a>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
