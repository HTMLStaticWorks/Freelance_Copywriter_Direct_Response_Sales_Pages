<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Alex Carter</title>
    <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" href="img/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="img/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
      padding: 2rem;
    }
    .auth-card {
      background: var(--bg-primary);
      border-radius: 24px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      position: relative;
    }
    .auth-controls {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
    }
    .social-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 50px;
      border: 1px solid var(--border-color);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 1rem;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .social-btn:hover { background: var(--bg-secondary); border-color: var(--text-primary); }
    .divider {
      display: flex;
      align-items: center;
      margin: 2rem 0;
      color: var(--text-secondary);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .divider span { padding: 0 1rem; font-size: 0.9rem; }
    .password-toggle {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-secondary);
      background: none;
      border: none;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-controls">
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle Theme">☀️</button>
        <button id="rtlToggle" class="rtl-toggle" aria-label="Toggle RTL">⇄</button>
      </div>
      <div class="text-center mb-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <img src="img/logo-icon.png" alt="Brand Logo" height="36" class="brand-logo-icon"> 
          <span class="brand-text-name fw-bold">ALEX<span class="text-gradient">COPY.</span></span>
        </a>
        <h2 class="fw-bold">Create Account</h2>
        <p class="text-secondary">Join to access the client portal</p>
      </div>
      
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
        Sign up with Google
      </button>
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/></svg>
        Sign up with Apple
      </button>

      <div class="divider"><span>OR</span></div>

      <form>
        <div class="mb-3">
          <label class="form-label fw-bold">Full Name</label>
          <input type="text" class="form-control bg-transparent border-secondary text-primary" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Email</label>
          <input type="email" class="form-control bg-transparent border-secondary text-primary" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-bold">Password</label>
          <div class="position-relative">
            <input type="password" id="passInput" class="form-control bg-transparent border-secondary text-primary" required>
            <button type="button" class="password-toggle" id="toggleBtn">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-premium w-100">Create Account</button>
      </form>
      <p class="text-center mt-4 mb-0 text-secondary small">
        Already have an account? <a href="login.html" class="fw-bold">Sign In</a>
      </p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('toggleBtn').addEventListener('click', function() {
      const input = document.getElementById('passInput');
      if (input.type === 'password') {
        input.type = 'text';
        this.textContent = '👁️‍🗨️';
      } else {
        input.type = 'password';
        this.textContent = '👁️';
      }
    });
  </script>
</body>
</html>
